name: Deploy Flutter Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web app
        run: >-
          flutter build web --release
          --base-href /mangotalk/
          --dart-define=SUPABASE_URL=https://qmzpyoulawdlecmtjkib.supabase.co
          --dart-define=SUPABASE_PUBLISHABLE_KEY=sb_publishable_l6Dx4gy4f2aNPD0Kx5e1nA_KvRoqxtb
          --dart-define=FIREBASE_WEB_API_KEY=AIzaSyAq_OejXpUSBpIaAO03e5ymirSl2NRpVjw
          --dart-define=FIREBASE_WEB_AUTH_DOMAIN=mangotalk-notifications.firebaseapp.com
          --dart-define=FIREBASE_PROJECT_ID=mangotalk-notifications
          --dart-define=FIREBASE_STORAGE_BUCKET=mangotalk-notifications.firebasestorage.app
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=682588856465
          --dart-define=FIREBASE_WEB_APP_ID=1:682588856465:web:e9623f8ec0fd5a78551f30
          --dart-define=FIREBASE_WEB_VAPID_KEY=BNilJmIPClV55BUtvDEyaaI3rpl__AZ3_XrIrYSJadWnrpatO3t1qQJJXHtK75AgACPDa7P7Zm__qzgG2ViRPtc

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
